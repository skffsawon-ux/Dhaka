name: CI Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Event: ${{ github.event_name }}"

      - name: Verify workflows exist
        run: |
          echo "Checking workflow files..."
          ls -la .github/workflows/
          echo ""
          echo "Workflow count: $(ls .github/workflows/*.yml 2>/dev/null | wc -l)"

      - name: Check repository structure
        run: |
          echo "Top-level directories:"
          ls -d */ 2>/dev/null || echo "No directories found"
          echo ""
          echo "Key files:"
          for f in Dockerfile Dockerfile.build Dockerfile.prod docker-compose.yml; do
            if [ -f "$f" ]; then
              echo "✓ $f exists"
            else
              echo "✗ $f not found"
            fi
          done
