name: Release to Deploy Repo

on:
  push:
    tags:
      - 'v*'      # v1.0.0, v2.1.3
      - '[0-9]*'  # 0.1.97, 1.0.0

env:
  RELEASE_REPO: innate-inc/innate-os-release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper sync

      - name: Get tag info
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Releasing tag: ${GITHUB_REF#refs/tags/}"

      - name: Push to release repo
        env:
          DEPLOY_KEY: ${{ secrets.RELEASE_REPO_DEPLOY_KEY }}
        run: |
          # Setup SSH for deploy key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          cat >> ~/.ssh/config << EOF
          Host github.com
              HostName github.com
              User git
              IdentityFile ~/.ssh/deploy_key
              IdentitiesOnly yes
              StrictHostKeyChecking no
          EOF
          
          TAG="${{ steps.tag.outputs.tag }}"
          
          # Remove workflow files (deploy keys can't push workflows)
          rm -rf .github/workflows
          
          # Commit the removal
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Release $TAG" --allow-empty
          
          # Add release repo as remote
          git remote add release git@github.com:${{ env.RELEASE_REPO }}.git
          
          # Push main branch (full history)
          echo "Pushing main branch to release repo..."
          git push release HEAD:main --force
          
          # Delete old tag on remote, create new tag on HEAD, and push
          echo "Updating tag $TAG on release repo..."
          git push release :refs/tags/"$TAG" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push release "$TAG"
          
          echo "✓ Released $TAG to ${{ env.RELEASE_REPO }}"

      - name: Create GitHub Release (optional)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
