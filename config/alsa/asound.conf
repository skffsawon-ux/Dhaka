#
#  ALSA library configuration file
#
#  Based on NVIDIA Jetson default, modified to use dmix for software mixing
#  and softvol for software volume control (MAX98357A has no hardware volume).
#  This allows multiple ALSA clients (e.g. TTS + keepalive) to share the
#  audio device simultaneously without "Device or resource busy" errors.
#

# Software volume control (the I2S amp has no hardware volume knob)
pcm.softvol {
        type softvol
        slave.pcm "dmixer"
        control {
                name "Master"
                card APE
        }
        min_dB -51.0
        max_dB 0.0
}

pcm.!default {
        type plug
        slave {
                pcm "softvol"
                channels 2
                rate 48000
        }
        hint.description "Tegra APE Soundcard (dmix + softvol)"
}

ctl.!default {
        type hw
        card APE
}
# Explicitly configured dmix to match I2S DAI format
pcm.dmixer {
    type dmix
    ipc_key 1024
    ipc_perm 0666
    slave {
        pcm "hw:APE,0"
        format S16_LE
        rate 48000
        channels 2
        period_size 1024
        buffer_size 4096
    }
}
