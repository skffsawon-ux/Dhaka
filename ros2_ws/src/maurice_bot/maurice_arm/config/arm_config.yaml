maurice_arm:
  ros__parameters:
    # Device detection automatic - looks for 7 servos at 1M baud
    baud_rate: 1000000
    control_frequency: 100.0
    trajectory_rate_hz: 100.0
    # joint_7 is the head servo. Its position_limits define the head angle range (radians).
    # Head position is inverted: negative head angle = positive servo angle (direction_reversed: true)
    joints: |
      {
          "joint_1": {
              "servo_id": 1,
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.5708
              },
              "pwm_limits": 885,
              "control_mode": 2,
              "pid_gains": {
                  "kp": 2000,
                  "ki": 0,
                  "kd": 1000
              }
          },
          "joint_2": {
              "servo_id": 2,
              "profile_velocity": 200,
              "profile_acceleration": 50,
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.22
              },
              "pwm_limits": 885,
              "control_mode": 2,
              "pid_gains": {
                  "kp": 3000,
                  "ki": 0,
                  "kd": 3000
              }
          },
          "joint_3": {
              "servo_id": 3,
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.7453
              },
              "profile_velocity": 200,
              "profile_acceleration": 50,
              "pwm_limits": 885,
              "control_mode": 2,
              "pid_gains": {
                  "kp": 2000,
                  "ki": 0,
                  "kd": 2000
              }
          },
          "joint_4": {
              "servo_id": 4,
              "profile_velocity": 200,
              "profile_acceleration": 50,
              "position_limits": {
                  "min": -1.9199,
                  "max": 1.7453
              },
              "pwm_limits": 885,
              "control_mode": 2,
              "pid_gains": {
                  "kp": 800,
                  "ki": 1000,
                  "kd": 4000
              }
          },
          "joint_5": {
              "servo_id": 5,
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.5708
              },
              "pwm_limits": 885,
              "control_mode": 2,
              "pid_gains": {
                  "kp": 400,
                  "ki": 0,
                  "kd": 0
              }
          },
          "joint_6": {
              "servo_id": 6,
              "position_limits": {
                  "min": -0.8727,
                  "max": 0.3491
              },
              "pwm_limits": 885,
              "current_limit": 100,
              "control_mode": 4,
              "pid_gains": {
                  "kp": 400,
                  "ki": 0,
                  "kd": 0
              }
          },
          "joint_7": {
              "servo_id": 7,
              "position_limits": {
                  "min": -0.4363,
                  "max": 0.4363
              },
              "pwm_limits": 885,
              "current_limit": 500,
              "control_mode": 3,
              "homing_offset": 341,
              "pid_gains": {
                  "kp": 400,
                  "ki": 1011,
                  "kd": 0
              },
              "head_config": {
                  "ai_position_deg": -20.0,
                  "direction_reversed": true
              }
          }
      }
    # Gain scheduling: interpolates PID gains based on elbow extension
    # "near" = arm folded (elbow +π/2), "far" = arm extended (elbow -π/2)
    gain_scheduling: |
      {
          "enabled": true,
          "near": {
              "joint_2": {"kp": 1500, "ki": 0, "kd": 2000},
              "joint_3": {"kp": 1500, "ki": 0, "kd": 1500},
              "joint_4": {"kp": 800,  "ki": 1000, "kd": 4000}
          },
          "far": {
              "joint_2": {"kp": 6000, "ki": 0, "kd": 12000},
              "joint_3": {"kp": 8000, "ki": 0, "kd": 12000},
              "joint_4": {"kp": 1500, "ki": 1000, "kd": 12000}
          }
      }
