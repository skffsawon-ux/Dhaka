maurice_arm:
  ros__parameters:
    # Device detection automatic - looks for 7 servos at 1M baud
    baud_rate: 1000000
    control_frequency: 200.0
    trajectory_rate_hz: 100.0
    # max_jerk: 1000.0  # rad/s³ jerk limit for trajectories (0 = disabled)
    max_jerk: 150.0  # rad/s³ jerk limit for trajectories (0 = disabled)
    # joint_7 is the head servo. Its position_limits define the head angle range (radians).
    # Head position is inverted: negative head angle = positive servo angle (direction_reversed: true)
    # =============================================================
    # PID Tuning Configuration for Maurice Arm
    # =============================================================
    # Edit values below and save. If pid_hot_reload.py is running,
    # changes apply INSTANTLY to the servos.
    #
    # PID gains (range 0 - 16383):
    #   kp = Proportional gain (stiffness)
    #   ki = Integral gain (steady-state error correction)
    #   kd = Derivative gain (damping / overshoot reduction)
    #   ff1 = Velocity feedforward (optional, addr 90, default 0)
    #   ff2 = Acceleration feedforward (optional, addr 88, default 0)
    #
    # Profile (0 = unlimited):
    #   profile_velocity     = max velocity (rev/min units)
    #   profile_acceleration = max acceleration (rev/min^2 units)
    # =============================================================
    # ── Servo Hardware Reference ──────────────────────────────────────────
    # Motor          | Voltage     | Gears   | Modes 0,5 (Current) | Modes 1,3,4,16 | Addr 126
    # XL330-M288     | 3.7-6V (5V) | Plastic | ✅ Yes (max 1750mA) | ✅ Yes          | Current (mA)
    # XC330-M288     | 3.7-6V (5V) | Metal   | ✅ Yes (max 1750mA) | ✅ Yes          | Current (mA)
    # XL430-W250     | 6.5-12V     | Plastic | ❌ No               | ✅ Yes          | Load (0.1%)
    # XC430-W150/T240| 6.5-14.8V   | Metal   | ❌ No               | ✅ Yes          | Load (0.1%)
    #
    # x330 = has current control (addr 38/102). x430 = no current hw.
    # Each joint's "motor_type" must match one of the names above.
    # The arm node uses it to guard current_limit writes and interpret addr 126.
    # ──────────────────────────────────────────────────────────────────────

    joints: |
      {
          "joint_1": {
              "servo_id": 1,
              "motor_type": "XL430-W250",
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.5708
              },
              "pwm_limits": 885,
              "control_mode": 3,
              "pid_gains": {
                  "kp": 220,
                  "ki": 0,
                  "kd": 100,
                  "ff1": 100,
                  "ff2": 200
              }
          },
          "joint_2": {
              "servo_id": 2,
              "motor_type": "XC430-W150",
              "profile_velocity": 0,
              "profile_acceleration": 0,
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.22
              },
              "pwm_limits": 885,
              "control_mode": 3,
              "pid_gains": {
                  "kp": 9900,
                  "ki": 0,
                  "kd": 100,
                  "ff1": 0
              }
          },
          "joint_3": {
              "servo_id": 3,
              "motor_type": "XL430-W250",
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.7453
              },
              "profile_velocity": 0,
              "profile_acceleration": 0,
              "pwm_limits": 885,
              "control_mode": 3,
              "pid_gains": {
                  "kp": 1500,
                  "ki": 0,
                  "kd": 200,
                  "ff1": 1701,
                  "ff2": 0
              }
          },
          "joint_4": {
              "servo_id": 4,
              "motor_type": "XC330-M288",
              "profile_velocity": 0,
              "profile_acceleration": 0,
              "position_limits": {
                  "min": -1.9199,
                  "max": 1.7453
              },
              "pwm_limits": 885,
              "control_mode": 3,
              "pid_gains": {
                  "kp": 2000,
                  "ki": 0,
                  "kd": 160,
                  "ff1": 5000
              }
          },
          "joint_5": {
              "servo_id": 5,
              "motor_type": "XC330-M288",
              "position_limits": {
                  "min": -1.5708,
                  "max": 1.5708
              },
              "pwm_limits": 885,
              "control_mode": 3,
              "pid_gains": {
                  "kp": 2900,
                  "ki": 0,
                  "kd": 0
              }
          },
          "joint_6": {
              "servo_id": 6,
              "motor_type": "XC330-M288",
              "position_limits": {
                  "min": -0.8727,
                  "max": 0.3491
              },
              "pwm_limits": 885,
              "current_limit": 100,
              "control_mode": 4,
              "pid_gains": {
                  "kp": 400,
                  "ki": 0,
                  "kd": 0
              }
          },
          "joint_7": {
              "servo_id": 7,
              "motor_type": "XC330-M288",
              "position_limits": {
                  "min": -0.4363,
                  "max": 0.4363
              },
              "pwm_limits": 885,
              "current_limit": 500,
              "control_mode": 3,
              "homing_offset": 341,
              "pid_gains": {
                  "kp": 400,
                  "ki": 1011,
                  "kd": 0
              },
              "head_config": {
                  "ai_position_deg": -20.0,
                  "direction_reversed": true
              }
          }
      }
    # =============================================================
    # Gain Scheduling (auto-adjusts PID based on arm extension)
    # =============================================================
    # When enabled, PID gains for joints 2-4 are interpolated between
    # "near" (arm retracted) and "far" (arm fully extended) profiles.
    # Extension is computed from 2D planar FK (joints 2+3+4) automatically.
    # The per-joint gains above are used when scheduling is OFF.
    # =============================================================
    gain_scheduling: |
      {
          "enabled": false,

          "near": {
              "joint_1": {"kp": 0, "ki": 0, "kd": 0}
          },
          "far": {
              "joint_1": {"kp": 0, "ki": 0, "kd": 0, "ff1": 0, "ff2": 1}
          }
      }

    #  {
        #   "enabled": false,
# 
        #   "near": {
            #   "joint_2": {"kp": 1500, "ki": 0, "kd": 2000},
            #   "joint_3": {"kp": 1500, "ki": 0, "kd": 2000},
            #   "joint_4": {"kp": 800,  "ki": 1000, "kd": 4000}
        #   },
        #   "far": {
            #   "joint_2": {"kp": 6000, "ki": 0, "kd": 12000},
            #   "joint_3": {"kp": 8000, "ki": 0, "kd": 12000},
            #   "joint_4": {"kp": 1500, "ki": 1000, "kd": 12000}
        #   }
    #   }

