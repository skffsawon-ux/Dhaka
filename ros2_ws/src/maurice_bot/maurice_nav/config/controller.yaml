/**:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5         # Differential drive: no lateral motion
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker", "goal_checker_precise"]
    controller_plugins: ["InnateFollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.16 # 10 deg
      stateful: True
    goal_checker_precise:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.08 # 5 deg
      stateful: True
    # MPPI controller parameters for the "FollowPath" plugin
    InnateFollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      
      # Motion model and basic parameters
      motion_model: "DiffDrive"
      time_steps: 50                    # 50 steps * 0.05s = 2.5s prediction horizon (matches old sim_time)
      model_dt: 0.05                    # 1/controller_frequency = 1/20 = 0.05s
      batch_size: 2000                  # Number of trajectory samples
      iteration_count: 1
      
      # Velocity limits (from existing DWB config)
      vx_min: -0.2                      # matches min_vel_x
      vx_max: 0.5                       # matches max_vel_x
      vy_max: 0.0                       # differential drive - no lateral motion
      wz_max: 0.8                       # matches max_vel_theta
      
      # Acceleration limits (increased for more responsive behavior)
      ax_min: -2.5                      # matches decel_lim_x from velocity_smoother
      ax_max: 2.5                       # matches acc_lim_x from velocity_smoother
      ay_min: 0.0                       # differential drive - no lateral acceleration
      ay_max: 0.0                       # differential drive - no lateral acceleration
      az_max: 3.2                       # matches acc_lim_theta from velocity_smoother
      
      # Sampling standard deviations
      vx_std: 0.2                       # Forward velocity sampling std
      vy_std: 0.0                       # No lateral sampling for diff drive
      wz_std: 0.4                       # Angular velocity sampling std
      
      # Path handling
      transform_tolerance: 0.2          # matches existing transform_tolerance
      prune_distance: 1.5               # Distance ahead to prune path
      max_robot_pose_search_dist: 10.0  # Max distance to search for nearest path point
      
      # Algorithm parameters
      temperature: 0.3                  # Trajectory selection temperature
      gamma: 0.015                      # Smoothness vs energy trade-off
      visualize: false                   # Set to true for debugging (slows performance)
      regenerate_noises: false
      
      # Goal tolerances
      xy_goal_tolerance: 0.25           # matches existing xy_goal_tolerance
      
      # Critics (objective functions)
      critics: [
        "ConstraintCritic", 
        "CostCritic", 
        "GoalCritic", 
        "GoalAngleCritic", 
        "PathAlignCritic", 
        "PathFollowCritic", 
        "PathAngleCritic", 
        "PreferForwardCritic"
      ]
      
      # Constraint critic - ensures trajectories stay within kinematic limits
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      
      # Cost critic - uses costmap for obstacle avoidance
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.8
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      
      # Goal critic - drives robot toward goal position
      GoalCritic:
        enabled: true
        cost_power: 2
        cost_weight: 15.0
        threshold_to_consider: 1.2       # Start considering when within this distance of goal
      
      # Goal angle critic - aligns robot with goal orientation
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      
      # Path alignment critic - keeps robot aligned with path
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      
      # Path following critic - drives progress along path
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 6
        threshold_to_consider: 1.2
      
      # Path angle critic - handles sharp turns
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.2
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0                          # Forward preference mode
      
      # Prefer forward critic - encourages forward motion over reversing
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
