controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.0         # Differential drive: no lateral motion
    min_theta_velocity_threshold: 0.05
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.1
      stateful: True

    # DWB controller parameters for the "FollowPath" plugin
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.0                   # Allow reverse up to -0.2 m/s
      min_vel_y: 0.0
      max_vel_x: 0.5                     # Maximum forward speed 0.4 m/s
      max_vel_y: 0.0
      max_vel_theta: 0.8                 # Maximum angular speed 0.1 rad/s
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 0.3                     # Linear acceleration limit 0.4 m/s²
      acc_lim_y: 0.0
      acc_lim_theta: 0.5                # Angular acceleration limit 1.0 rad/s²
      decel_lim_x: -0.3                  # Linear deceleration limit -0.4 m/s²
      decel_lim_y: 0.0
      decel_lim_theta: -0.5             # Angular deceleration limit -1.0 rad/s²
      vx_samples: 40
      vy_samples: 0
      vtheta_samples: 100
      sim_time: 2.5
      linear_granularity: 0.05
      angular_granularity: 0.05
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.5
      ObstacleFootprint.scale: 0.5
      PathAlign.scale: 64.0
      GoalAlign.scale: 5.0
      PathAlign.forward_point_distance: 0.2
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 128.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
