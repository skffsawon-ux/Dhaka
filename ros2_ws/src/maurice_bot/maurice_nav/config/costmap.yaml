navigation:
  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 5.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: false
        footprint: "[[0.25, 0.165], [0.25, -0.165], [-0.20, -0.165], [-0.20, 0.165]]"
        resolution: 0.05
        track_unknown_space: true        # Now unknown areas are treated as obstacles
        unknown_cost_value: 255          # Unknown cells set to a lethal cost
        rolling_window: false
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.2
            obstacle_max_range: 2.5
            obstacle_min_range: 0.2
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 10.0
          inflation_radius: 0.3
        always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: "[[0.25, 0.165], [0.25, -0.165], [-0.20, -0.165], [-0.20, 0.165]]"
      track_unknown_space: false        # Ensure unknown space is considered as obstacles
      unknown_cost_value: 255          # Unknown cells get a lethal cost value
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.25
mapfree:
  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 5.0
        global_frame: odom
        robot_base_frame: base_link
        use_sim_time: false
        footprint: "[[0.25, 0.165], [0.25, -0.165], [-0.20, -0.165], [-0.20, 0.165]]"
        resolution: 0.05
        # track_unknown_space: false        # Now unknown areas are treated as obstacles
        # unknown_cost_value: 255          # Unknown cells set to a lethal cost
        rolling_window: true
        width: 10
        height: 10
        plugins: [ #"obstacle_layer", 
          "voxel_layer",
          "inflation_layer",
          ]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.2
            obstacle_max_range: 2.5
            obstacle_min_range: 0.2
        voxel_layer:
          plugin: "nav2_costmap_2d::VoxelLayer"
          enabled: True
          footprint_clearing_enabled: true
          max_obstacle_height: 2.0
          publish_voxel_map: False
          origin_z: 0.0
          z_resolution: 0.05
          z_voxels: 10
          max_obstacle_height: 2.0
          unknown_threshold: 9 
          mark_threshold: 2
          observation_sources: pointcloud
          combination_method: 1
          pointcloud:  # no frame set, uses frame from message
            topic: /mars/main_camera/points
            max_obstacle_height: 0.35 # TODO height based on arm? # right now just above head
            min_obstacle_height: 0.01
            obstacle_max_range: 2.5
            obstacle_min_range: 0.05
            raytrace_max_range: 2.5
            raytrace_min_range: 0.05
            clearing: True
            marking: True
            data_type: "PointCloud2"
            transport_type: "raw"  # raw or/ with compression (zlib, draco, zstd)
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 10.0
          inflation_radius: 0.3
        always_send_full_costmap: True
 
