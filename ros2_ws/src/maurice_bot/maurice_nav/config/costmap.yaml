navigation:
  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 5.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: false
        footprint: "[[0.25, 0.165], [0.25, -0.165], [-0.20, -0.165], [-0.20, 0.165]]"
        resolution: 0.05
        track_unknown_space: true        # Now unknown areas are treated as obstacles
        unknown_cost_value: 255          # Unknown cells set to a lethal cost
        rolling_window: false
        plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: True
          map_topic: "/map"
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: scan
          scan:
            topic: /scan
            max_obstacle_height: 2.0
            clearing: True
            marking: True
            data_type: "LaserScan"
            raytrace_max_range: 3.0
            raytrace_min_range: 0.2
            obstacle_max_range: 2.5
            obstacle_min_range: 0.2
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 10.0
          inflation_radius: 0.3
        always_send_full_costmap: False
        voxel_layer:
          plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
          enabled:               true
          voxel_decay:           2.0     #seconds if linear, e^n if exponential
          decay_model:           0      #0=linear, 1=exponential, -1=persistent
          voxel_size:            0.05   #meters
          track_unknown_space:   true   #default space is unknown
          observation_persistence: 0.0  #seconds
          max_obstacle_height:   0.36    #meters
          mark_threshold:        0      #voxel height
          update_footprint_enabled: true
          combination_method:    1      #1=max, 0=override
          obstacle_range:        3.0    #meters
          origin_z:              0.0    #meters
          publish_voxel_map:     false   # default off
          transform_tolerance:   0.2    # seconds
          observation_sources:   rgbd1_clear rgbd1_mark
          rgbd1_mark:
            data_type: PointCloud2
            topic: /mars/main_camera/points
            marking: true
            clearing: false
            obstacle_range: 2.5
            min_obstacle_height: 0.05     #default 0, meters
            max_obstacle_height: 0.36     #defaule 3, meters
            expected_update_rate: 0.0    #default 0, if not updating at this rate at least, remove from buffer
            observation_persistence: 0.0 #default 0, use all measurements taken during now-value, 0=latest 
            inf_is_valid: false          #default false, for laser scans
            clear_after_reading: false    #default false, clear the buffer after the layer gets readings from it
            filter: "voxel"              #default passthrough, apply "voxel", "passthrough", or no filter to sensor data, recommended to have at one filter on
            voxel_min_points: 5          #default 0, minimum points per voxel for voxel filter
          rgbd1_clear:
            enabled: false                #default true, can be toggled on/off with associated service call
            data_type: PointCloud2
            topic: /mars/main_camera/points
            marking: false
            clearing: true
            min_z: 0.0                   #default 0, meters
            max_z: 7.0                   #default 10, meters
            vertical_fov_angle: 0.7      #default 0.7, radians
            horizontal_fov_angle: 1.04   #default 1.04, radians
            decay_acceleration: 1.       #default 0, 1/s^2. If laser scanner MUST be 0
            model_type: 0                #default 0 (depth camera). Use 1 for 3D Lidar


local_costmap:
