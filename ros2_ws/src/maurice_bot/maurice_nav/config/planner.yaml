planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: false

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      allow_unknown: false                # Do not allow planning through unknown space
      tolerance: 0.15                     # Tighter goal tolerance for precise navigation
      max_iterations: 1000000             # Maximum iterations for the search
      max_on_approach_iterations: 1000    # Iterations when nearing the goal
      max_planning_time: 3.0              # Reduced planning time for quicker response
      analytic_expansion_ratio: 3.0       # More conservative analytic expansion
      analytic_expansion_max_length: 3.0  # Maximum length for analytic expansion
      analytic_expansion_max_cost: 200.0  # Maximum cost threshold during analytic expansion
      analytic_expansion_max_cost_override: false
      reverse_penalty: 3.0               # High penalty for reversing motion
      change_penalty: 0.05                # Penalty for changing direction
      non_straight_penalty: 1.05          # Slight penalty for non-straight paths
      cost_penalty: 3.5                   # Bias toward the center of passages
      rotation_penalty: 1.2               # In-place rotation penalty
      retrospective_penalty: 0.015        # Additional penalty term
      lookup_table_size: 20.0             # Size of the heuristic lookup table (in meters)
      cache_obstacle_heuristic: false     # Caching disabled by default
      allow_reverse_expansion: True      # Do not allow reverse expansion
      smooth_path: True                   # Enable path smoothing
      smoother:
        max_iterations: 500               # Maximum iterations for the smoother
        w_smooth: 0.3                     # Weight for smoothness
        w_data: 0.2                       # Weight for adherence to original path data
        tolerance: 1.0e-10                # Convergence tolerance
        do_refinement: true               # Enable further refinement
        refinement_num: 2                 # Number of refinement passes
