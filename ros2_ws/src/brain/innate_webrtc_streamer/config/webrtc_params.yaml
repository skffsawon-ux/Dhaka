webrtc_streamer_node:
  ros__parameters:
    # Video settings (Option 5B: Balanced quality)
    video:
      width: 640
      height: 480
      fps: 30
      bitrate_kbps: 2500
    
    # Source settings (Option 2A: Subscribe to /color/image raw)
    source:
      image_topic: "/color/image"
    
    # Encoder settings (Option 3B: Software with hardware detection)
    encoder:
      preset: "superfast"       # x264 speed preset (ultrafast, superfast, veryfast, faster, fast, medium)
      tune: "zerolatency"       # Optimize for low latency
      threads: 2                # Limit CPU cores used
      keyint_frames: 30         # Keyframe every 30 frames (1 second @ 30fps)
      try_hardware: true        # Auto-detect and use hardware encoder if available
    
    # Network settings
    network:
      stun_server: ""
    
    # Feature flags
    features:
      enable_stats: true        # Publish statistics to /webrtc/stats
      stats_interval_sec: 5.0   # How often to publish stats
      single_consumer: true     # Reject new offers while streaming


