# ROS2 logging configuration file
# This file configures the logging format to be more concise and readable

[logger_ros2]
level=INFO
handlers=ros2_console
qualname=ros2
propagate=0

[handler_ros2_console]
class=StreamHandler
level=INFO
formatter=ros2_fmt
args=(sys.stdout,)

[formatter_ros2_fmt]
format=[%(levelname)s] [%(name)s]: %(message)s
datefmt=
class=logging.Formatter 